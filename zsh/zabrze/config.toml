[[abbrevs]]
name = "awk '{print $1}'"
abbr = ".1"
snippet = "awk '{print $1}'"

[[abbrevs]]
name = "git push (force safely)"
abbr = "-f"
snippet = "--force-with-lease --force-if-includes"
global = true
context = '^git push\s'

[[abbrevs]]
name = "docker"
abbr = "do"
snippet = "docker"
if = "(( ${+commands[docker]} ))"

[[abbrevs]]
name = "docker compose"
abbr = "co"
snippet = "compose"
global = true
context = '^docker\s'
if = "(( ${+commands[docker]} ))"

[[abbrevs]]
name = "podman"
abbr = "po"
snippet = "podman"
if = "(( ${+commands[podman]} ))"

[[abbrevs]]
name = "kubectl"
abbr = "kc"
snippet = "kubectl"
if = "(( ${+commands[kubectl]} ))"

[[abbrevs]]
name = "terraform"
abbr = "tf"
snippet = "terraform"
if = "(( ${+commands[terraform]} ))"
